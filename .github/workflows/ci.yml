name: BetterDocs PHP Compatibility & Runtime

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'BetterDocs branch'
        default: 'master'
      pro_branch:
        description: 'BetterDocs Pro branch'
        default: 'master'
      chatbot_branch:
        description: 'BetterDocs Chatbot branch'
        default: 'main'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  phpcompat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5]
        wp: [6.0, 6.5, 6.9.4, latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, phpcs, wp-cli

      - name: Install PHPCompatibilityWP
        run: |
          composer global require "squizlabs/php_codesniffer:^3.0" "dealerdirect/phpcodesniffer-composer-installer:*" "phpcompatibility/phpcompatibility-wp:*" --no-interaction
          echo "$(composer global config home)/vendor/bin" >> $GITHUB_PATH

      - name: Install WordPress & Plugins
        env:
          ESSENTIAL_BLOCKS_PAT: ${{ secrets.ESSENTIAL_BLOCKS_PAT }}
          WP_DB_NAME: wp_${{ matrix.php }}_${{ matrix.wp }}
        run: |
          bash scripts/install-wp.sh
          bash scripts/install-plugins.sh

      - name: Run PHP Compatibility Scan
        run: |
          mkdir -p reports/${{ matrix.php }}
          phpcs --standard=PHPCompatibilityWP --runtime-set testVersion ${{ matrix.php }} --extensions=php --report=full --report-file=reports/${{ matrix.php }}/phpcompat.txt ./test-site/wp-content/plugins/betterdocs

      - name: Fatal Error Check
        run: |
          nohup wp server --host=127.0.0.1 --port=8080 --path=./test-site --allow-root > wpserver.log 2>&1 &
          sleep 10
          # Simple fatal check via curl
          curl -s http://127.0.0.1:8080/wp-admin/ | grep -iE "fatal error|parse error|uncaught error" && exit 1 || echo "No fatal errors on dashboard"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.php }}-${{ matrix.wp }}
          path: reports/
