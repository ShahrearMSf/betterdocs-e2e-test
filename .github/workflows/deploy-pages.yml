name: Deploy QA Report to GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["BetterDocs PHP Compatibility & Runtime"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: all-reports

      - name: Build Final Report
        run: |
          mkdir -p gh-pages
          # Simple index page for reports
          echo "<html><body><h1>BetterDocs QA Reports</h1><ul>" > gh-pages/index.html
          if [ -d "all-reports" ]; then
            for d in all-reports/*; do
              echo "<li><a href='$(basename $d)/phpcompat.txt'>PHP $(basename $d) Compat</a></li>" >> gh-pages/index.html
              cp -r "$d" gh-pages/
            done
          fi
          echo "</ul></body></html>" >> gh-pages/index.html
          touch gh-pages/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
