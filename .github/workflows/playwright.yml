name: BetterDocs Playwright E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup WordPress & Plugins
      env:
        ESSENTIAL_BLOCKS_PAT: ${{ secrets.ESSENTIAL_BLOCKS_PAT }}
      run: |
        # Use a consistent PHP version for E2E
        sudo update-alternatives --set php /usr/bin/php8.2
        bash scripts/install-wp.sh
        bash scripts/install-plugins.sh
        bash scripts/create-demo-content.sh

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
